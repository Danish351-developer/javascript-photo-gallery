            </p>

            <div class="gallery">

                <figure>
                    <img src="images/hunza.png"
                        alt="Snow-covered mountains in Hunza Valley">
                    <figcaption>Hunza Valley</figcaption>

                    <img src="images/skardu.png"
                        alt="Beautiful landscape of Skardu">

                    <img src="images/murree.png"
                        alt="Green hills and forests in Murree">

                    <img src="images/lake.png"
                        alt="A peaceful lake surrounded by mountains">
                    <figcaption>Mountain Lake</figcaption>
                </figure>

                    <img src="images/forest.png"
                        alt="A lush green forest with tall trees">
                    <figcaption>Forest</figcaption>
                </figure>

                <figure>
                    <img src="images/sunset.png"
